<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eth Mini Indexer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .live-indicator {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* [이론: CSS 애니메이션] 부드러운 회전 효과 정의 */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">🚀 Eth Mini Indexer</h1>
            <div class="flex items-center gap-2">
                <span class="live-indicator h-3 w-3 rounded-full bg-green-500"></span>
                <span id="status" class="text-sm font-mono text-gray-400">Backend: Connecting...</span>
                <button onclick="openSettings()" class="bg-gray-700 p-2 rounded-full hover:bg-gray-600 transition">
                    ⚙️ 알림 설정
                </button>
                <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
                    <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 w-80">
                        <h3 class="text-xl font-bold mb-4">🐋 고액 거래 알림 설정</h3>
                        <label class="block text-sm text-gray-400 mb-2">알림 임계값 (ETH)</label>
                        <input type="number" id="thresholdInput" value="100"
                            class="w-full bg-gray-900 border border-gray-600 p-2 rounded mb-4 focus:outline-none focus:border-blue-500">
                        <div class="flex justify-end gap-2">
                            <button onclick="closeSettings()" class="px-4 py-2 text-gray-400">취소</button>
                            <button onclick="saveSettings()" id="saveBtn"
                                class=" px-4 py-2 bg-blue-600 rounded font-bold">저장</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl shadow-2xl overflow-hidden border border-gray-700">
            <div class="flex gap-4 mb-6">
                <input id="searchInput" type="text" placeholder="지갑 주소 또는 블록 번호 입력"
                    class="flex-1 bg-gray-800 border border-gray-700 text-white p-3 rounded-lg focus:outline-none focus:border-blue-500">
                <button onclick="handleSearch()"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold">
                    검색
                </button>
                <button onclick="clearSearch()" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-lg">
                    초기화
                </button>
            </div>
            <div id="newBlockAlert" onclick="clearSearch()"
                class="hidden cursor-pointer mb-4 p-3 bg-blue-600/20 border border-blue-500 rounded-lg text-center hover:bg-blue-600/30 transition-all">
                <span class="text-blue-400 font-bold">
                    🔔 새로운 블록이 <span id="newBlockCount">0</span>개 생성되었습니다.
                    <span class="text-xs underline ml-2">(클릭하여 실시간 모드로 복구)</span>
                </span>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 mb-8">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    🏆 Top 5 Active Addresses (24h)
                </h3>
                <div id="topAddressList" class="space-y-3">
                    <p class="text-gray-500 text-sm animate-pulse">데이터 분석 중...</p>
                </div>
            </div>
            <div id="chartContainer" class="hidden bg-gray-800 p-6 rounded-xl border border-gray-700 mb-8"
                style="position: relative; height: 400px; width: 100%;">
                <h3 class="text-lg font-semibold mb-4 text-gray-300">24h 자산 흐름 추이</h3>
                <canvas id="balanceChart"></canvas>
            </div>
            <div class="p-6 border-b border-gray-700 bg-gray-800/50">
                <h2 class="text-xl font-semibold">Latest Transactions</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-700/50 text-gray-300 uppercase text-xs">
                        <tr>
                            <th class="p-4">Block</th>
                            <th class="p-4">Hash</th>
                            <th class="p-4">From</th>
                            <th class="p-4">To</th>
                            <th class="p-4">Value (Wei)</th>
                            <th class="p-4 text-right">Value (ETH)</th>
                        </tr>
                    </thead>
                    <tbody id="transactionBody" class="divide-y divide-gray-700 text-sm font-mono">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Utility Functions
        // 주소 축약 함수 (예: 0x1234...abcd)
        //const shortAddr = (addr) => addr ? `${addr.slice(0, 6)}...${addr.slice(-4)}` : 'Contract Creation';
        // 주소 축약 함수 (0x1234...abcd)
        const shortAddr = (addr) => addr && addr.length > 10
            ? `${addr.substring(0, 6)}...${addr.substring(addr.length - 4)}`
            : addr;

        // 1 ETH = 10^18 Wei 변환 함수
        const formatEth = (weiValue) => {
            // 1. 값이 없거나 undefined인 경우 방어 코드
            if (weiValue === undefined || weiValue === null || weiValue === "") return "0 ETH";

            try {
                // 2. BigInt를 사용하여 정밀도 유지 (문자열 그대로 처리)
                const wei = BigInt(weiValue);

                // 3. ETH 단위로 변환 (10^18)
                // BigInt는 소수점 계산이 안 되므로, 문자열 조작이나 소수점 변환 기법 사용
                const eth = Number(wei) / 1e18;

                // 4. 숫자가 너무 작아 지수 표기법(e-7 등)이 되는 것 방지
                return eth.toLocaleString(undefined, {
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 6
                }) + " ETH";
            } catch (e) {
                console.error("Value 변환 에러:", e, "원본값:", weiValue);
                return "Error";
            }
        };
        let timer;
        let unreadCount = 0; // [이론: 카운터] 미확인 블록 수 저장
        // --- 핵심 함수: API 데이터 렌더링 ---
        /**
         * [이론: 데이터 매핑] API 응답 데이터를 HTML 테이블로 변환
         * @param {Array} transactions - 백엔드에서 받은 트랜잭션 배열
         */
        function renderTable(transactions) {
            const tableBody = document.getElementById('transactionBody'); // tbody ID 가정
            tableBody.innerHTML = ''; // 기존 데이터 초기화

            // 1. [이론: 예외 처리] 데이터가 없을 경우 처리
            if (!transactions || transactions.length === 0) {
                tableBody.innerHTML = `
            <tr>
                <td colspan="5" class="p-10 text-center text-gray-500 italic">
                    🔍 검색 결과가 없거나 데이터가 아직 로드되지 않았습니다.
                </td>
            </tr>`;
                return;
            }

            // 2. [이론: 데이터 순회] 트랜잭션 리스트를 돌며 행(Row) 생성
            transactions.forEach(tx => {
                const row = document.createElement('tr');

                // ETH 값 포맷팅 (소수점 4자리)
                const displayEth = tx.eth_value ? tx.eth_value.toLocaleString(undefined, {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 4
                }) : "0.0000";

                row.className = "border-b border-gray-800 hover:bg-gray-800/50 transition-colors";
                row.innerHTML = `
                    <td class="p-4 text-blue-400 font-mono text-sm">#${tx.block_number}</td>
                    <td class="p-4 text-gray-300 font-mono text-xs" title="${tx.hash}">
                        ${shortAddr(tx.hash)}
                    </td>
                    <td class="p-4 text-orange-300 font-mono text-sm" title="${tx.from_address}">
                        ${shortAddr(tx.from_address)}
                    </td>
                    <td class="p-4 text-green-300 font-mono text-sm" title="${tx.to_address}">
                        ${shortAddr(tx.to_address)}
                    </td>
                    <td class="p-4 text-green-300 font-mono text-sm" title="${tx.to_address}">
                        ${shortAddr(tx.raw_value)}
                    </td>
                    <td class="p-4 text-right font-bold text-white">
                        ${displayEth} <span class="text-xs text-gray-500 font-normal ml-1">ETH</span>
                    </td>
                `;

                tableBody.appendChild(row);
            });
        }

        /**
         * [이론: 통합 함수 설계] 
         * query 인자가 없으면 기본값 ""을 사용함 (JS식 오버로딩 구현)
         */
        async function fetchTransactions(query = "") {
            const tableBody = document.getElementById('transactionBody');

            // 1. [이론: 로딩 시작] 요청 전 스피너 표시
            tableBody.innerHTML = getLoadingSpinner();
            try {
                console.log("🔍 요청 쿼리:", query); // 디버깅용

                // 1. [이론: URL 조합] 쿼리가 있으면 붙이고 없으면 기본 경로 사용
                const url = `http://localhost:8080/api/transactions${query}`;

                const response = await fetch(url);
                if (!response.ok) throw new Error("네트워크 응답 에러");

                const data = await response.json();

                // 2. 데이터 렌더링 함수 호출
                renderTable(data);

            } catch (error) {
                console.error("❌ 데이터 로드 실패:", error);
                // 에러 발생 시 사용자에게 알림 (선택 사항)
                const tableBody = document.getElementById('transactionBody');
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center p-4 text-red-500">데이터를 가져오는데 실패했습니다.</td></tr>`;
            }
        }

        // --- 로딩 상태 UI 함수 ---
        function getLoadingSpinner() {
            return `
                <tr>
                    <td colspan="5" class="p-20 text-center">
                        <div class="flex flex-col items-center justify-center gap-4">
                            <div class="w-12 h-12 border-4 border-gray-600 border-t-blue-500 rounded-full animate-spin"></div>
                            <p class="text-gray-400 text-sm font-medium">이더리움 데이터를 가져오는 중...</p>
                        </div>
                    </td>
                </tr>
            `;
        }

        let socket;
        let isSearchMode = false; // [이론: 상태 변수] 검색 모드 여부 추적
        // --- 웹소켓 연결 및 이벤트 핸들링 ---
        function connectWebsocket() {
            socket = new WebSocket("ws://localhost:8080/ws");

            socket.onopen = () => {
                document.getElementById('status').innerText = "Backend: Connected (Live)";
                document.getElementById('status').classList.replace('text-gray-400', 'text-green-400');
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "WHALE_ALERT") {
                    showWhaleAlert(data);
                }
                if (data.type === "NEW_BLOCK") {
                    // [핵심 로직] 검색 모드가 아닐 때만 자동 갱신 수행
                    if (!isSearchMode) {
                        console.log("🔔 새 블록 수신: 실시간 갱신 중...");
                        fetchTransactions();
                    } else {
                        console.log("⏸️ 검색 모드 활성화 중: 실시간 갱신 일시 정지");
                        unreadCount++;
                        showBadge();
                    }
                }
            };

            socket.onclose = () => {
                document.getElementById('status').innerText = "Backend: Reconnecting...";
                document.getElementById('status').classList.replace('text-green-400', 'text-red-400');
                setTimeout(connectWebsocket, 3000);
            };
        }

        // --- 배지 제어 함수 ---
        function showBadge() {
            const alertBox = document.getElementById('newBlockAlert');
            const countText = document.getElementById('newBlockCount');

            countText.innerText = unreadCount;
            alertBox.classList.remove('hidden'); // 배지 노출
        }
        function hideBadge() {
            const alertBox = document.getElementById('newBlockAlert');
            unreadCount = 0; // 카운트 초기화
            alertBox.classList.add('hidden'); // 배지 숨김
            hideChart(); // 차트도 숨김 (검색 초기화 시)
        }

        // --- 검색 제어 함수 수정 ---
        function handleSearch() {
            const val = document.getElementById('searchInput').value.trim();
            if (!val) {
                clearSearch(); // 빈 값 입력 시 초기화와 동일하게 처리
                return;
            }

            // 1. 검색 모드 활성화 (웹소켓 갱신 차단)
            isSearchMode = true;
            hideBadge(); // 새 검색 시작 시 이전 배지 청소
            updateStatusUI("Search Mode (Paused)");

            let queryString = "";
            if (val.startsWith("0x")) {
                queryString = `?address=${val}`;
            } else if (!isNaN(val)) {
                queryString = `?block=${val}`;
            }

            fetchTransactions(queryString);

            if (val.startsWith("0x")) updateChartUI(val);
        }
        function clearSearch() {
            document.getElementById('searchInput').value = "";

            // 2. 검색 모드 해제 (실시간 갱신 다시 시작)
            isSearchMode = false;

            hideBadge(); // 배지 초기화
            hideChart(); // 차트 숨김
            updateStatusUI("Live");
            fetchTransactions();
        }

        // [유틸리티] 상단 상태 표시 텍스트 변경
        function updateStatusUI(mode) {
            const statusText = document.getElementById('status');
            if (mode === "Live") {
                statusText.innerText = "Backend: Connected (Live)";
                statusText.classList.add('text-green-400');
            } else {
                statusText.innerText = `Backend: ${mode}`;
                statusText.classList.replace('text-green-400', 'text-yellow-400');
            }
        }
        // 1. 모달 열기 및 현재 설정값 불러오기
        async function openSettings() {
            const modal = document.getElementById('settingsModal');
            const input = document.getElementById('thresholdInput');

            try {
                // 백엔드에서 현재 설정된 임계값 가져오기
                const response = await fetch('http://localhost:8080/api/currentSet');
                input.value = await response.json();

                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } catch (error) {
                console.error("설정 로드 실패:", error);
                alert("서버 연결에 실패했습니다.");
            }
        }

        // 2. 모달 닫기
        function closeSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // 3. 설정 저장 (백엔드 전송)
        async function saveSettings() {
            const threshold = parseFloat(document.getElementById('thresholdInput').value);
            const saveBtn = document.getElementById('saveBtn');

            if (isNaN(threshold) || threshold < 0) {
                alert("올바른 금액을 입력해주세요.");
                return;
            }

            saveBtn.innerText = "저장 중...";
            saveBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:8080/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ threshold: threshold })
                });

                if (response.ok) {
                    // 성공 피드백
                    saveBtn.innerText = "✅ 저장 완료!";
                    saveBtn.classList.replace('bg-blue-600', 'bg-green-600');

                    setTimeout(() => {
                        saveBtn.innerText = "설정 저장";
                        saveBtn.classList.replace('bg-green-600', 'bg-blue-600');
                        saveBtn.disabled = false;
                        closeSettings();
                    }, 1000);
                }
            } catch (error) {
                console.error("설정 저장 실패:", error);
                alert("저장 중 오류가 발생했습니다.");
                saveBtn.disabled = false;
                saveBtn.innerText = "설정 저장";
            }
        }

        // --- 고액 거래 알림 함수 ---
        function showWhaleAlert(data) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-5 right-5 bg-red-600 text-white p-5 rounded-2xl shadow-2xl animate-bounce z-50 border-4 border-yellow-400";
            toast.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-3xl">🐋</span>
                    <div>
                        <p class="font-black text-lg underline">WHALE ALERT!</p>
                        <p class="text-sm">${data.value.toFixed(2)} ETH 이동됨</p>
                        <p class="text-[10px] opacity-70">${data.hash.substring(0, 20)}...</p>
                    </div>
                </div>
            `;
            document.body.appendChild(toast);

            // 알림 사운드 (선택 사항)
            // new Audio('alert_sound.mp3').play();

            setTimeout(() => toast.remove(), 7000); // 7초 후 삭제
        }

        let myChart; // 전역 변수로 차트 인스턴스 관리
        // --- 차트 업데이트 함수 ---
        async function updateChartUI(address) {
            try {
                const response = await fetch(`http://localhost:8080/api/balance/history?address=${address}`);
                const data = await response.json();

                if (!data.labels || data.labels.length === 0) {
                    // 데이터가 없을 때의 UI 처리
                    document.getElementById('chartContainer').innerHTML = `
                        <div class="text-center py-10 text-gray-500">
                            <p>📭 최근 24시간 동안의 거래 내역이 없습니다.</p>
                        </div>
                    `;
                    return;
                }
                document.getElementById('chartContainer').classList.remove('hidden');

                const ctx = document.getElementById('balanceChart').getContext('2d');

                // 기존 차트가 있으면 파괴 (메모리 누수 방지)
                if (myChart) myChart.destroy();

                myChart = new Chart(ctx, {
                    type: 'line', // 선 그래프
                    data: {
                        labels: data.labels, // x축 (시간)
                        datasets: [
                            {
                                label: 'Total In (ETH)',
                                data: data.incoming, // y축 (입금액)
                                borderColor: '#4ade80', // green-400
                                backgroundColor: 'rgba(74, 222, 128, 0.1)',
                                fill: true, // 영역 채우기
                                tension: 0.3 // 곡선 부드럽게
                            },
                            {
                                label: 'Total Out (ETH)',
                                data: data.outgoing, // y축 (출금액)
                                borderColor: '#f87171', // red-400
                                backgroundColor: 'rgba(248, 113, 113, 0.1)',
                                fill: true,
                                tension: 0.3
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: '#9ca3af' } } // gray-400
                        },
                        scales: {
                            x: { ticks: { color: '#6b7280' }, grid: { display: false } }, // gray-500
                            y: { ticks: { color: '#6b7280' }, grid: { color: '#374151' } } // gray-700
                        }
                    }
                });
            } catch (e) {
                console.error("그래프 로드 실패", e);
            }
        }
        async function initChart() {
            const canvas = document.getElementById('balanceChart');
            if (!canvas) {
                console.error("❌ canvas 엘리먼트를 찾을 수 없습니다!");
                return;
            }
            const ctx = canvas.getContext('2d');
        }
        window.addEventListener('DOMContentLoaded', (event) => {
            initChart();
        });
        async function hideChart() {
            const chartContainer = document.getElementById('chartContainer');
            if (chartContainer) {
                chartContainer.classList.add('hidden');
            }
        }
        async function updateTopAddresses() {
            try {
                const response = await fetch('http://localhost:8080/api/stats/top-addresses');
                const data = await response.json();

                const container = document.getElementById('topAddressList');
                container.innerHTML = ''; // 초기화

                data.forEach((item, index) => {
                    const row = document.createElement('div');
                    row.className = "flex justify-between items-center p-3 bg-gray-900 rounded-lg border border-gray-700 hover:border-blue-500 transition-colors cursor-pointer";
                    row.onclick = () => {
                        document.getElementById('searchInput').value = item.address;
                        handleSearch(); // 클릭 시 해당 주소 바로 검색
                    };

                    row.innerHTML = `
                        <div class="flex items-center gap-3">
                            <span class="text-blue-500 font-bold">#${index + 1}</span>
                            <span class="text-gray-300 text-xs font-mono">${item.address.substring(0, 15)}...</span>
                        </div>
                        <span class="bg-blue-900/30 text-blue-400 text-xs px-2 py-1 rounded-full font-bold">
                            ${item.count} TXs
                        </span>
                    `;
                    container.appendChild(row);
                });
            } catch (e) {
                console.error("랭킹 로드 실패", e);
            }
        }

        // 30초마다 자동 갱신
        setInterval(updateTopAddresses, 30000);
        updateTopAddresses();
        // 초기 로드
        fetchTransactions();
        connectWebsocket();
        // timer = setInterval(fetchTransactions, 10000);
    </script>
</body>

</html>
