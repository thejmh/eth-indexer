<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eth Mini Indexer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .live-indicator {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">🚀 Eth Mini Indexer</h1>
            <div class="flex items-center gap-2">
                <span class="live-indicator h-3 w-3 rounded-full bg-green-500"></span>
                <span id="status" class="text-sm font-mono text-gray-400">Backend: Connecting...</span>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl shadow-2xl overflow-hidden border border-gray-700">
            <div class="p-6 border-b border-gray-700 bg-gray-800/50">
                <h2 class="text-xl font-semibold">Latest Transactions</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-700/50 text-gray-300 uppercase text-xs">
                        <tr>
                            <th class="p-4">Block</th>
                            <th class="p-4">Hash</th>
                            <th class="p-4">From</th>
                            <th class="p-4">To</th>
                            <th class="p-4 text-right">Value (Wei)</th>
                            <th class="p-4 text-right">Value (ETH)</th>
                        </tr>
                    </thead>
                    <tbody id="tx-table-body" class="divide-y divide-gray-700 text-sm font-mono">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 주소 축약 함수 (예: 0x1234...abcd)
        const shortAddr = (addr) => addr ? `${addr.slice(0, 6)}...${addr.slice(-4)}` : 'Contract Creation';

        // 1 ETH = 10^18 Wei 변환 함수
        const formatEth = (weiValue) => {
            // 1. 값이 없거나 undefined인 경우 방어 코드
            if (weiValue === undefined || weiValue === null || weiValue === "") return "0 ETH";

            try {
                // 2. BigInt를 사용하여 정밀도 유지 (문자열 그대로 처리)
                const wei = BigInt(weiValue);

                // 3. ETH 단위로 변환 (10^18)
                // BigInt는 소수점 계산이 안 되므로, 문자열 조작이나 소수점 변환 기법 사용
                const eth = Number(wei) / 1e18;

                // 4. 숫자가 너무 작아 지수 표기법(e-7 등)이 되는 것 방지
                return eth.toLocaleString(undefined, {
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 6
                }) + " ETH";
            } catch (e) {
                console.error("Value 변환 에러:", e, "원본값:", weiValue);
                return "Error";
            }
        };

        async function fetchTransactions() {
            try {
                const response = await fetch('http://localhost:8080/api/transactions');
                const data = await response.json();

                const tableBody = document.getElementById('tx-table-body');
                const status = document.getElementById('status');

                status.innerText = `Last Sync: ${new Date().toLocaleTimeString()}`;

                // 테이블 초기화 후 렌더링
                tableBody.innerHTML = '';
                data.forEach(tx => {
                    const row = `
                        <tr class="hover:bg-gray-700/30 transition-colors">
                            <td class="p-4 text-blue-300">#${tx.block_number}</td>
                            <td class="p-4 text-gray-400" title="${tx.hash}">${shortAddr(tx.hash)}</td>
                            <td class="p-4 text-orange-300">${shortAddr(tx.from_address)}</td>
                            <td class="p-4 text-green-300">${shortAddr(tx.to_address)}</td>
                            <td class="p-4 text-right font-bold text-white">${formatEth(tx.value)}</td>
                            <td class="p-4 text-right font-bold text-white">${tx.eth_value.toFixed(4)} ETH</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('status').innerText = 'Backend: Disconnected';
            }
        }

        // 10초마다 데이터 갱신
        fetchTransactions();
        setInterval(fetchTransactions, 10000);
    </script>
</body>

</html>
