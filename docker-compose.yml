version: '3.8'

services:
  # 이더리움 로그 수집기 (Go)
  indexer:
    build: ./go-indexer
    ports:
      - "8080:8080"
    volumes:
      - ./go-indexer:/app
    environment:
      - ETH_RPC_URL=https://mainnet.infura.io/v3/<YOUR_INFURA_PROJECT_ID>
      - TELEGRAM_BOT_TOKEN=<YOUR_TELEGRAM_BOT_TOKEN>
      - TELEGRAM_CHAT_ID=<YOUR_TELEGRAM_CHAT_ID>
      - DB_URL=postgres://user:pass@db:5432/eth_db
    depends_on:
      - db

  # 데이터 조회 API (Node.js)
  api:
    build: ./node-api
    ports:
      - "3000:3000"
    volumes:
      - ./node-api:/app
    depends_on:
      - db

  # 데이터 저장소 (PostgreSQL)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: eth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
